services:
  ai-server:
    image: ${AI_SERVER_IMAGE}
    network_mode: host
    env_file: [.env]
    environment:
      APP_ENV: ${APP_ENV}
      VLLM_BASE_URL: ${VLLM_BASE_URL}
      VLLM_MODEL: ${VLLM_MODEL}
      VLLM_LORA_ADAPTER_CHECKLIST: ${VLLM_LORA_ADAPTER_CHECKLIST}
      VLLM_LORA_ADAPTER_EASYCONTRACT: ${VLLM_LORA_ADAPTER_EASYCONTRACT}
      CHROMADB_URL: ""
      BACKEND_CALLBACK_BASE_URL: ${BACKEND_CALLBACK_BASE_URL}
      HTTP_TIMEOUT_SEC: ${HTTP_TIMEOUT_SEC}
      RABBITMQ_ENABLED: "${RABBITMQ_ENABLED}"
      RABBITMQ_PREFETCH_COUNT: "${RABBITMQ_PREFETCH_COUNT}"
      RABBITMQ_DECLARE_PASSIVE: "${RABBITMQ_DECLARE_PASSIVE}"
      WORKER_RETRY_MAX_ATTEMPTS: "3"
      WORKER_RETRY_BACKOFF_BASE_SEC: "0.5"
      EXTERNAL_RETRY_MAX_ATTEMPTS: "3"
      EXTERNAL_RETRY_BACKOFF_BASE_SEC: "0.5"
      EASY_CONTRACT_CANCEL_TTL_SEC: "3600"
      EASY_CONTRACT_CANCEL_CLEANUP_INTERVAL_SEC: "60"
      RABBITMQ_REQUEST_EXCHANGE_EASY_CONTRACT: fast.exchange
      RABBITMQ_REQUEST_QUEUE_EASY_CONTRACT: easy-contract.request
      RABBITMQ_REQUEST_ROUTING_KEY_EASY_CONTRACT: easy-contract.request
      RABBITMQ_REQUEST_EXCHANGE_CHECKLIST: fast.exchange
      RABBITMQ_REQUEST_QUEUE_CHECKLIST: checklist.request
      RABBITMQ_REQUEST_ROUTING_KEY_CHECKLIST: checklist.request
      RABBITMQ_CANCEL_EXCHANGE_EASY_CONTRACT: fast.exchange
      RABBITMQ_CANCEL_QUEUE_EASY_CONTRACT: cancel.request
      RABBITMQ_CANCEL_ROUTING_KEY_EASY_CONTRACT: cancel.request
      RABBITMQ_RESULT_EXCHANGE: fast.exchange
      RABBITMQ_RESULT_QUEUE: ai.response
      RABBITMQ_RESULT_ROUTING_KEY: ai.response
    restart: unless-stopped
