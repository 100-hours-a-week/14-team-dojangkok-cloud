# ============================================================
# V3 K8S Ansible — NGINX Gateway Fabric (NodePort 30080/30443)
# Branch: feat/v3-k8s-iac
# ============================================================

- name: Install Gateway API CRDs
  command: >
    kubectl --kubeconfig=/home/ubuntu/.kube/config apply -f
    https://github.com/kubernetes-sigs/gateway-api/releases/download/v1.2.0/standard-install.yaml
  register: gateway_api_result
  changed_when: "'created' in gateway_api_result.stdout"

- name: Install NGINX Gateway Fabric
  command: >
    helm --kubeconfig=/home/ubuntu/.kube/config
    upgrade --install nginx-gateway
    oci://ghcr.io/nginx/charts/nginx-gateway-fabric
    --namespace nginx-gateway --create-namespace
    --set service.type=NodePort
    --set service.ports[0].port=80,service.ports[0].nodePort={{ gateway_nodeport_http }}
    --set service.ports[1].port=443,service.ports[1].nodePort={{ gateway_nodeport_https }}
  register: ngf_install
  changed_when: "'deployed' in ngf_install.stdout or 'upgraded' in ngf_install.stdout"
