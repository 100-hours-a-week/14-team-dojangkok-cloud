# ============================================================
# V3 K8S Ansible — External Secrets Operator 설치
# Branch: feat/v3-k8s-iac
# values.yaml: k8s/infra/external-secrets/values.yaml 과 동일한 설정
# ============================================================

- name: Add External Secrets Helm repository
  command: >
    helm --kubeconfig=/home/ubuntu/.kube/config
    repo add external-secrets https://charts.external-secrets.io
  register: repo_add
  changed_when: "'has been added' in repo_add.stdout"
  failed_when: false

- name: Update Helm repositories
  command: >
    helm --kubeconfig=/home/ubuntu/.kube/config repo update
  changed_when: false

- name: Install External Secrets Operator
  command: >
    helm --kubeconfig=/home/ubuntu/.kube/config
    upgrade --install external-secrets external-secrets/external-secrets
    --namespace external-secrets --create-namespace
    --set replicaCount=1
    --set webhook.replicaCount=1
    --set certController.replicaCount=1
    --set resources.requests.cpu=25m
    --set resources.requests.memory=64Mi
    --set serviceAccount.create=true
    --set serviceAccount.name=external-secrets-sa
  register: eso_install
  changed_when: "'deployed' in eso_install.stdout or 'upgraded' in eso_install.stdout"

- name: Wait for ESO to be ready
  command: >
    kubectl --kubeconfig=/home/ubuntu/.kube/config
    rollout status deployment/external-secrets
    -n external-secrets --timeout=120s
  changed_when: false

- name: Wait for ESO CRDs to be established
  command: >
    kubectl --kubeconfig=/home/ubuntu/.kube/config
    wait --for=condition=Established
    crd/clustersecretstores.external-secrets.io
    --timeout=60s
  changed_when: false

- name: Get ClusterSecretStore served API version from CRD
  shell: |
    kubectl --kubeconfig=/home/ubuntu/.kube/config get crd clustersecretstores.external-secrets.io \
      -o jsonpath='{.spec.versions[?(@.served==true)].name}' | tr ' ' '\n' | sort -rV | head -1
  register: css_api_version
  changed_when: false

- name: Apply ClusterSecretStore
  shell: |
    cat <<'EOF' | kubectl --kubeconfig=/home/ubuntu/.kube/config apply -f -
    apiVersion: external-secrets.io/{{ css_api_version.stdout }}
    kind: ClusterSecretStore
    metadata:
      name: aws-secrets-manager
    spec:
      provider:
        aws:
          service: SecretsManager
          region: ap-northeast-2
    EOF
  register: css_apply
  changed_when: false
