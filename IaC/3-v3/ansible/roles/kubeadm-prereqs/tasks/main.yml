# ============================================================
# V3 K8S Ansible — kubeadm/kubelet/kubectl 설치
# Branch: feat/v3-k8s-iac
# ============================================================

- name: Add Kubernetes apt key
  apt_key:
    url: "https://pkgs.k8s.io/core:/stable:/v{{ k8s_version }}/deb/Release.key"
    keyring: /etc/apt/keyrings/kubernetes-apt-keyring.gpg
    state: present

- name: Add Kubernetes apt repository
  apt_repository:
    repo: "deb [signed-by=/etc/apt/keyrings/kubernetes-apt-keyring.gpg] https://pkgs.k8s.io/core:/stable:/v{{ k8s_version }}/deb/ /"
    state: present
    filename: kubernetes

- name: Install kubeadm, kubelet, kubectl
  apt:
    name:
      - "kubeadm={{ k8s_minor }}-*"
      - "kubelet={{ k8s_minor }}-*"
      - "kubectl={{ k8s_minor }}-*"
    state: present
    update_cache: true

- name: Hold kubernetes packages
  dpkg_selections:
    name: "{{ item }}"
    selection: hold
  loop:
    - kubeadm
    - kubelet
    - kubectl

  # NOTE: /etc/default/kubelet은 ecr-credential-provider role에서
  # resolv-conf + credential-provider 플래그를 병합하여 최종 설정.
  # 여기서 중복 설정하면 role 실행 순서에 따라 덮어쓰기 발생.

- name: Enable kubelet
  systemd:
    name: kubelet
    enabled: true
