# 실험 A: baseline — replicas 3, topologySpread 없음, PDB 없음
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: dojangkok
  labels:
    app.kubernetes.io/name: backend
spec:
  replicas: 3
  selector:
    matchLabels:
      app.kubernetes.io/name: backend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: backend
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: backend
          image: 920624925547.dkr.ecr.ap-northeast-2.amazonaws.com/dev-dojangkok-be:latest
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: SPRING_CONFIG_LOCATION
              value: "file:/app/config/application.yaml"
          volumeMounts:
            - name: spring-config
              mountPath: /app/config
              readOnly: true
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 2
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 12
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
          lifecycle:
            preStop:
              exec:
                command: ["sh", "-c", "sleep 5"]
      tolerations:
        - key: "node.kubernetes.io/not-ready"
          operator: "Exists"
          effect: "NoExecute"
          tolerationSeconds: 60
        - key: "node.kubernetes.io/unreachable"
          operator: "Exists"
          effect: "NoExecute"
          tolerationSeconds: 60
      volumes:
        - name: spring-config
          secret:
            secretName: backend-secret
            items:
              - key: application.yaml
                path: application.yaml
