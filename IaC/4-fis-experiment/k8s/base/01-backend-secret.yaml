apiVersion: v1
kind: Secret
metadata:
  name: backend-secret
  namespace: dojangkok
type: Opaque
stringData:
  application.yaml: |
    # TODO: 실제 배포 전 data 인스턴스(10.0.0.202) 접속 정보로 교체
    spring:
      datasource:
        url: jdbc:mysql://10.0.0.202:3306/dojangkok?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul
        username: dojangkok
        password: CHANGE_ME
        driver-class-name: com.mysql.cj.jdbc.Driver
      data:
        redis:
          host: 10.0.0.202
          port: 6379
        mongodb:
          uri: mongodb://10.0.0.202:27017/dojangkok
      rabbitmq:
        host: 10.0.0.202
        port: 5672
        username: guest
        password: guest
    server:
      port: 8080
