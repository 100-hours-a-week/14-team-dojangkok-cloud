# kubeadm join — Worker 노드
# V3 대비 변경: SSH 기반, node_az는 inventory에서 전달

- name: Check if already joined
  stat:
    path: /etc/kubernetes/kubelet.conf
  register: kubelet_conf

- name: Generate join command on CP (fallback)
  delegate_to: "{{ groups['role_control_plane'][0] }}"
  command: kubeadm token create --print-join-command --ttl=2h
  register: fallback_join_command
  changed_when: false
  when:
    - not kubelet_conf.stat.exists
    - hostvars[groups['role_control_plane'][0]].kubeadm_join_command is not defined

- name: Join cluster
  command: >
    {{ hostvars[groups['role_control_plane'][0]].kubeadm_join_command
       | default(fallback_join_command.stdout) }}
    --node-name={{ inventory_hostname }}
  when: not kubelet_conf.stat.exists

- name: Label worker node (from CP)
  delegate_to: "{{ groups['role_control_plane'][0] }}"
  command: >
    kubectl --kubeconfig=/home/ubuntu/.kube/config
    label node {{ inventory_hostname }}
    node-role.kubernetes.io/worker=
    topology.kubernetes.io/zone={{ node_az }}
    --overwrite
  changed_when: false
