# kubeadm init — CP 초기화
# V3 대비 변경: --node-name에 private_ip 사용, SSM user_data 없음

- name: Check if cluster already initialized
  stat:
    path: /etc/kubernetes/admin.conf
  register: kubeadm_init_check

- name: Initialize control plane
  command: >
    kubeadm init
    --pod-network-cidr={{ pod_cidr }}
    --service-cidr={{ service_cidr }}
    --kubernetes-version={{ k8s_minor }}
    --apiserver-advertise-address={{ private_ip }}
    --node-name={{ inventory_hostname }}
  when: not kubeadm_init_check.stat.exists

- name: Create .kube directory for ubuntu user
  file:
    path: /home/ubuntu/.kube
    state: directory
    owner: ubuntu
    group: ubuntu
    mode: "0755"

- name: Copy admin.conf to ubuntu user
  copy:
    src: /etc/kubernetes/admin.conf
    dest: /home/ubuntu/.kube/config
    remote_src: true
    owner: ubuntu
    group: ubuntu
    mode: "0644"

- name: Generate join command
  command: kubeadm token create --print-join-command --ttl=2h
  register: join_command
  changed_when: false

- name: Store join command as fact
  set_fact:
    kubeadm_join_command: "{{ join_command.stdout }}"

- name: Install Helm
  shell: |
    curl -fsSL https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash
  args:
    creates: /usr/local/bin/helm

- name: Label CP node
  command: >
    kubectl --kubeconfig=/home/ubuntu/.kube/config
    label node {{ inventory_hostname }}
    node-role.kubernetes.io/control-plane=
    --overwrite
  changed_when: false
