# 1. kubelet Probe 허용 — Worker/CP 노드 → 모든 Pod
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-kubelet-probe
  namespace: dojangkok
spec:
  podSelector: {}
  policyTypes: [Ingress]
  ingress:
    - from:
        - ipBlock:
            cidr: 10.0.48.0/20
---
# 2. Gateway → FE/BE/AI 인바운드 허용
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-gateway-ingress
  namespace: dojangkok
spec:
  podSelector:
    matchExpressions:
      - key: app.kubernetes.io/name
        operator: In
        values: [frontend, backend, chatting-be, ai-server]
  policyTypes: [Ingress]
  ingress:
    # nginx-gateway NS controller에서 직접 오는 트래픽
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: nginx-gateway
    # gateway-nginx 데이터 플레인 Pod (dojangkok NS)에서 라우팅
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: dojangkok-gateway-nginx
---
# 3. Gateway 데이터 플레인 Ingress — ALB/NodePort 트래픽 (externalTrafficPolicy: Local)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-gateway-nodeport-ingress
  namespace: dojangkok
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: dojangkok-gateway-nginx
  policyTypes: [Ingress]
  ingress:
    - from:
        - ipBlock:
            cidr: 10.0.0.0/18
      ports:
        - port: 80
          protocol: TCP
---
# 4. BE 내부 인바운드 — FE(SSR) + AI Server에서 콜백 허용
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-backend-ingress
  namespace: dojangkok
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: backend
  policyTypes: [Ingress]
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: frontend
      ports:
        - port: 8080
          protocol: TCP
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: ai-server
      ports:
        - port: 8080
          protocol: TCP
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: chatting-be
      ports:
        - port: 8080
          protocol: TCP
---
# 5. AI Server 내부 인바운드 — chatting-be에서 AI 챗봇 호출 허용
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-ai-server-from-chatting
  namespace: dojangkok
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: ai-server
  policyTypes: [Ingress]
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: chatting-be
      ports:
        - port: 8000
          protocol: TCP
