apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-server
  namespace: dojangkok
  labels:
    app.kubernetes.io/name: ai-server
    app.kubernetes.io/component: ai
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: ai-server
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ai-server
        app.kubernetes.io/component: ai
    spec:
      serviceAccountName: ai-sa
      automountServiceAccountToken: false
      terminationGracePeriodSeconds: 30
      containers:
        - name: ai-server
          image: 662505429975.dkr.ecr.ap-northeast-2.amazonaws.com/dev-dojangkok-ai:latest
          ports:
            - name: http
              containerPort: 8000
          envFrom:
            - configMapRef:
                name: ai-server-config
            - secretRef:
                name: ai-server-secret
          env:
            - name: OTEL_SERVICE_NAME
              value: "ai-server"
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "http://alloy.monitoring.svc.cluster.local:4318"
            - name: OTEL_TRACES_SAMPLER
              value: "parentbased_traceidratio"
            - name: OTEL_TRACES_SAMPLER_ARG
              value: "1.0"
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              cpu: 600m
              memory: 1024Mi
          lifecycle:
            preStop:
              exec:
                command: ["sh", "-c", "sleep 10"]
