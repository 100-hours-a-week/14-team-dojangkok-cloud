apiVersion: v1
kind: ConfigMap
metadata:
  name: ai-server-config
  namespace: dojangkok
  labels:
    app.kubernetes.io/name: ai-server
data:
  # --- App ---
  APP_ENV: "dev"
  HTTP_TIMEOUT_SEC: "180"

  # --- Vector DB (ChromaDB) ---
  VECTOR_DB_MODE: "remote"
  VECTOR_DB_HOST: "chromadb.internal.dev.dojangkok.cloud"
  VECTOR_DB_PORT: "8000"
  VECTOR_DB_COLLECTION_CONTRACT: "contract_docs"
  VECTOR_DB_COLLECTION_CORPUS: "dispute_cases"
  EMBEDDING_MODEL: "BAAI/bge-small-en-v1.5"
  CORPUS_JSONL_PATH: "corpus_data/corpus.jsonl"

  # --- vLLM ---
  VLLM_BASE_URL: "http://vllm.internal.dev.dojangkok.cloud:8000/v1"
  VLLM_MODEL: "LGAI-EXAONE/EXAONE-3.5-7.8B-Instruct"
  VLLM_LORA_ADAPTER_CHECKLIST: "checklist"
  VLLM_LORA_ADAPTER_EASYCONTRACT: "easycontract"

  # --- RabbitMQ 설정 ---
  RABBITMQ_ENABLED: "true"
  RABBITMQ_PREFETCH_COUNT: "3"
  RABBITMQ_DECLARE_PASSIVE: "true"

  # --- RabbitMQ 라우팅 ---
  RABBITMQ_REQUEST_EXCHANGE_EASY_CONTRACT: "fast.exchange"
  RABBITMQ_REQUEST_QUEUE_EASY_CONTRACT: "quorum.easy-contract.request"
  RABBITMQ_REQUEST_ROUTING_KEY_EASY_CONTRACT: "quorum.easy-contract.request"
  RABBITMQ_REQUEST_EXCHANGE_CHECKLIST: "fast.exchange"
  RABBITMQ_REQUEST_QUEUE_CHECKLIST: "quorum.checklist.request"
  RABBITMQ_REQUEST_ROUTING_KEY_CHECKLIST: "quorum.checklist.request"
  RABBITMQ_CANCEL_EXCHANGE_EASY_CONTRACT: "fast.exchange"
  RABBITMQ_CANCEL_QUEUE_EASY_CONTRACT: "quorum.cancel.request"
  RABBITMQ_CANCEL_ROUTING_KEY_EASY_CONTRACT: "quorum.cancel.request"
  RABBITMQ_RESULT_EXCHANGE: "fast.exchange"
  RABBITMQ_RESULT_QUEUE: "quorum.ai.response"
  RABBITMQ_RESULT_ROUTING_KEY: "quorum.ai.response"

  # --- 재시도 ---
  WORKER_RETRY_MAX_ATTEMPTS: "3"
  WORKER_RETRY_BACKOFF_BASE_SEC: "0.5"
  EXTERNAL_RETRY_MAX_ATTEMPTS: "3"
  EXTERNAL_RETRY_BACKOFF_BASE_SEC: "0.5"

  # --- 취소 ---
  EASY_CONTRACT_CANCEL_TTL_SEC: "3600"
  EASY_CONTRACT_CANCEL_CLEANUP_INTERVAL_SEC: "60"
