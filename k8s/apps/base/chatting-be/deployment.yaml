apiVersion: apps/v1
kind: Deployment
metadata:
  name: chatting-be
  namespace: dojangkok
  labels:
    app.kubernetes.io/name: chatting-be
    app.kubernetes.io/component: api
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: chatting-be
  template:
    metadata:
      labels:
        app.kubernetes.io/name: chatting-be
        app.kubernetes.io/component: api
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: chatting-be
          image: 662505429975.dkr.ecr.ap-northeast-2.amazonaws.com/dev-dojangkok-chatting-be:latest
          ports:
            - name: http
              containerPort: 8081
          envFrom:
            - configMapRef:
                name: chatting-be-config
          env:
            - name: SPRING_CONFIG_LOCATION
              value: "file:/app/config/application.yaml"
          volumeMounts:
            - name: spring-config
              mountPath: /app/config
              readOnly: true
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8081
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8081
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /actuator/health
              port: 8081
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 30
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              cpu: 600m
              memory: 1024Mi
          lifecycle:
            preStop:
              exec:
                command: ["sh", "-c", "sleep 10"]
      volumes:
        - name: spring-config
          secret:
            secretName: chatting-be-secret
            items:
              - key: application.yaml
                path: application.yaml
