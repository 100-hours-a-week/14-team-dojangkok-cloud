apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: dojangkok
spec:
  replicas: 2
  template:
    spec:
      containers:
        - name: backend
          resources:
            requests:
              cpu: 700m
              memory: 1536Mi
            limits:
              cpu: 2000m
              memory: 2048Mi
