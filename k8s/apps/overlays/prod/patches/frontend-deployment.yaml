apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: dojangkok
spec:
  replicas: 2
  template:
    spec:
      containers:
        - name: frontend
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 1500m
              memory: 1024Mi
