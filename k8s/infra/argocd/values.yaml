# ArgoCD Helm values — 도장콕 K8S 클러스터
# Chart: argo/argo-cd
# 총 리소스 예산: ~300m CPU, ~512MB RAM

server:
  replicas: 1
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 200m
      memory: 256Mi
  service:
    type: ClusterIP  # kubectl port-forward로 접근

controller:
  replicas: 1
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

repoServer:
  replicas: 1
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 300m
      memory: 256Mi

redis:
  resources:
    requests:
      cpu: 25m
      memory: 64Mi
    limits:
      cpu: 100m
      memory: 128Mi

# 불필요한 컴포넌트 비활성화
dex:
  enabled: false

notifications:
  enabled: false

applicationSet:
  enabled: false
