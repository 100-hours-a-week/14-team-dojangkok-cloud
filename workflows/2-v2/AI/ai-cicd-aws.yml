# AI Server CI/CD Pipeline (AWS)
# GCP MIG → AWS 단일 EC2 이전
#
# 트리거:
#   - PR → dev: lint-test만 실행
#   - Push dev (PR 머지): lint-test → build-push (ECR) → deploy (SSM)
#   - workflow_dispatch: 전체 실행
#
# 패키지 관리: uv (pyproject.toml + uv.lock)
# 인증: AWS OIDC
# 배포: Docker Build (arm64) → ECR Push → SSM Run Command

name: AI Server CI/CD (AWS)

concurrency:
  group: ai-server-aws-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [dev]
    paths-ignore:
      - '.github/workflows/**'
      - '**.md'
      - 'docs/**'
  pull_request:
    branches: [dev]
    paths-ignore:
      - '.github/workflows/**'
      - '**.md'
      - 'docs/**'
  workflow_dispatch:

env:
  PYTHON_VERSION: "3.10"

jobs:
  # ============================================
  # CI: Lint & Test
  # ============================================
  lint-test:
    name: Lint & Test
    runs-on: ubuntu-22.04
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Install Python
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: uv sync --frozen

      - name: Run Ruff Linter
        run: ruff check . || echo "::warning::Lint errors found (non-blocking)"

      - name: Run Ruff Formatter Check
        run: ruff format --check . || echo "::warning::Format issues found (non-blocking)"

      - name: Run Tests
        run: |
          if [ -d "tests" ]; then
            uv run pytest tests/ -v --cov=. --cov-report=xml
          else
            echo "No tests directory found, skipping tests"
          fi

  # ============================================
  # CI/CD: Docker Build (arm64) → ECR Push
  # ============================================
  build-push:
    name: Build & Push to ECR
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    needs: lint-test
    runs-on: ubuntu-22.04
    permissions:
      contents: read
      id-token: write
    outputs:
      image_uri: ${{ steps.build.outputs.image_uri }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build & Push Docker Image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: true
          platforms: linux/arm64
          provenance: false
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/dev-dojangkok-ai:latest
            ${{ steps.login-ecr.outputs.registry }}/dev-dojangkok-ai:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Image Summary
        run: |
          IMAGE="${{ steps.login-ecr.outputs.registry }}/dev-dojangkok-ai:${{ github.sha }}"
          echo "image_uri=$IMAGE" >> $GITHUB_OUTPUT
          echo "### Docker Image" >> $GITHUB_STEP_SUMMARY
          echo "- **Image**: $IMAGE" >> $GITHUB_STEP_SUMMARY
          echo "- **Platform**: linux/arm64" >> $GITHUB_STEP_SUMMARY

  # ============================================
  # CD: SSM Run Command → docker compose pull + up
  # ============================================
  deploy:
    name: Deploy (SSM Run Command)
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    needs: build-push
    runs-on: ubuntu-22.04
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Deploy via SSM Run Command
        id: deploy
        run: |
          ECR_REGISTRY="${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com"

          COMMAND_ID=$(aws ssm send-command \
            --targets "Key=tag:Name,Values=${{ secrets.AI_INSTANCE_TAG }}" \
            --document-name "AWS-RunShellScript" \
            --timeout-seconds 300 \
            --parameters "commands=[
              \"aws s3 cp s3://${{ secrets.S3_CONFIG_BUCKET }}/ai/dev/docker-compose.yml /opt/app/docker-compose.yml --region ${{ secrets.AWS_REGION }}\",
              \"aws ecr get-login-password --region ${{ secrets.AWS_REGION }} | docker login --username AWS --password-stdin $ECR_REGISTRY\",
              \"cd /opt/app && docker compose pull && docker compose down && docker compose up -d\"
            ]" \
            --query "Command.CommandId" \
            --output text)

          echo "command_id=$COMMAND_ID" >> $GITHUB_OUTPUT
          echo "SSM Command ID: $COMMAND_ID"

      - name: Wait for Command Completion
        run: |
          echo "Waiting for SSM command to complete..."
          for i in {1..30}; do
            STATUS=$(aws ssm list-command-invocations \
              --command-id ${{ steps.deploy.outputs.command_id }} \
              --details \
              --query "CommandInvocations[0].Status" \
              --output text 2>/dev/null || echo "Pending")

            if [ "$STATUS" = "Success" ]; then
              echo "Deploy succeeded"
              exit 0
            elif [ "$STATUS" = "Failed" ] || [ "$STATUS" = "TimedOut" ]; then
              echo "Deploy failed: $STATUS"
              aws ssm list-command-invocations \
                --command-id ${{ steps.deploy.outputs.command_id }} \
                --details \
                --query "CommandInvocations[0].CommandPlugins[0].Output" \
                --output text
              exit 1
            fi
            echo "Status: $STATUS — waiting 10s ($i/30)..."
            sleep 10
          done
          echo "Timed out waiting for command"
          exit 1

      - name: Health Check
        run: |
          INSTANCE_ID=$(aws ec2 describe-instances \
            --filters "Name=tag:Name,Values=${{ secrets.AI_INSTANCE_TAG }}" "Name=instance-state-name,Values=running" \
            --query "Reservations[0].Instances[0].InstanceId" \
            --output text)

          echo "Health checking instance: $INSTANCE_ID"

          for i in {1..12}; do
            RESULT=$(aws ssm send-command \
              --instance-ids "$INSTANCE_ID" \
              --document-name "AWS-RunShellScript" \
              --parameters 'commands=["curl -sf http://localhost:8000/health"]' \
              --query "Command.CommandId" \
              --output text)

            sleep 5

            OUTPUT=$(aws ssm get-command-invocation \
              --command-id "$RESULT" \
              --instance-id "$INSTANCE_ID" \
              --query "StandardOutputContent" \
              --output text 2>/dev/null || echo "")

            if [ -n "$OUTPUT" ] && [ "$OUTPUT" != "None" ]; then
              echo "Health check passed: $OUTPUT"
              exit 0
            fi
            echo "Attempt $i/12 — waiting 10s..."
            sleep 10
          done

          echo "::warning::Health check did not pass within timeout"

      - name: Deploy Summary
        if: always()
        run: |
          echo "### Deployment" >> $GITHUB_STEP_SUMMARY
          echo "- **Target**: ${{ secrets.AI_INSTANCE_TAG }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Method**: SSM Run Command" >> $GITHUB_STEP_SUMMARY
          echo "- **Command ID**: ${{ steps.deploy.outputs.command_id }}" >> $GITHUB_STEP_SUMMARY
